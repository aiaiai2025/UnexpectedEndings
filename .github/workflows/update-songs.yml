name: Update songs.json

# Runs automatically whenever audio files are pushed to the repo.
# Also lets you trigger it manually from the Actions tab.
on:
  push:
    paths:
      - 'audio/**'
  workflow_dispatch:

jobs:
  update-songs:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed so the Action can commit songs.json back

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Generate songs.json from audio folder
        run: python3 .github/scripts/generate_songs.py

      - name: Commit updated songs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add songs.json
          # Only commit if songs.json actually changed
          git diff --staged --quiet || git commit -m "Auto-update songs.json [skip ci]"
          git push
